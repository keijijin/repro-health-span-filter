receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  filter/drop_actuator_health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["url.path"] != nil and IsMatch(attributes["url.path"], "^/actuator/health.*")'
        - 'attributes["http.target"] != nil and IsMatch(attributes["http.target"], "^/actuator/health.*")'
        - 'attributes["http.route"] != nil and IsMatch(attributes["http.route"], "^/actuator/health.*")'
  batch:

exporters:
  debug:
    verbosity: detailed
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/drop_actuator_health, batch]
      exporters: [debug, otlp/jaeger]
