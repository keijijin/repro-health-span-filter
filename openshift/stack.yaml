apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    app.kubernetes.io/part-of: source-exclusion-demo
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/part-of: source-exclusion-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/part-of: source-exclusion-demo
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.121.0
        args:
          - "--config=/etc/otelcol/config.yaml"
        ports:
          - containerPort: 4317
            name: otlp-grpc
          - containerPort: 4318
            name: otlp-http
        volumeMounts:
          - name: collector-config
            mountPath: /etc/otelcol
      volumes:
      - name: collector-config
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    app.kubernetes.io/part-of: source-exclusion-demo
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repro-app
  labels:
    app.kubernetes.io/part-of: source-exclusion-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repro-app
  template:
    metadata:
      labels:
        app: repro-app
        app.kubernetes.io/part-of: source-exclusion-demo
    spec:
      containers:
      - name: app
        image: __APP_IMAGE__
        imagePullPolicy: Always
        ports:
          - containerPort: 8080
            name: http
        env:
          - name: EXTRA_JAVA_TOOL_OPTIONS
            value: ""
          - name: JAVA_TOOL_OPTIONS
            value: >-
              -javaagent:/app/opentelemetry-javaagent.jar
              -Dotel.service.name=repro-app
              -Dotel.traces.exporter=otlp
              -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
              -Dotel.exporter.otlp.protocol=http/protobuf
              -Dotel.metrics.exporter=none
              -Dotel.logs.exporter=none
              -Dotel.traces.sampler=always_on
              $(EXTRA_JAVA_TOOL_OPTIONS)
---
apiVersion: v1
kind: Service
metadata:
  name: repro-app
  labels:
    app.kubernetes.io/part-of: source-exclusion-demo
spec:
  selector:
    app: repro-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
